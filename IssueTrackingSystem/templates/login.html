{% extends 'base.html' %}
{% block content %}

<center>

    <h3>Login</h3>
    {% if messages %}
    {% for message in messages %}
        <div class="alert alert-danger">
            {{ message }}
        </div>
    {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-success">Login</button>
    </form>
</>
</center>
{% endblock %}
